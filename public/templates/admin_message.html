<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SUBJECT}}</title>
</head>
<body style='font-family: Arial, sans-serif; line-height: 1.6; color: #333;'>
    <div style='max-width: 600px; margin: 0 auto; padding: 20px;'>
        <div style='text-align: center; margin-bottom: 30px; padding: 20px; background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%); border-radius: 10px;'>
            <img src='{{logoUrl}}' alt='AI Revision Bot' style='max-width: 200px; height: auto; display: block; margin: 0 auto;' />
        </div>

        <h2 style='color: #1890ff; margin-bottom: 20px;'>{{SUBJECT}}</h2>

        <p>Dear <strong>{{NAME}}</strong>,</p>

        <div style='background-color: #f9f9f9; padding: 20px; border-radius: 5px; margin: 20px 0; border-left: 4px solid #1890ff;'>
            {{MESSAGE_BODY}}
        </div>

        <div style='text-align: center; margin: 30px 0;'>
            <a href='{{APP_URL}}' style='display: inline-block; background-color: #1890ff; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-weight: bold;'>Go to AI Revision Bot</a>
        </div>

        <p style='color: #888; font-size: 12px; border-top: 1px solid #eee; padding-top: 15px; margin-top: 30px;'>
            This message was sent by your AI Revision Bot administrator. Please do not reply to this email.
        </p>

        <p>Best regards,<br>
        <strong>AI Revision Bot</strong></p>
    </div>
</body>
</html>
